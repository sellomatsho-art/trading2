<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Bot - Mobile Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fff;
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #4ade80 0%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            color: #94a3b8;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
            background: #166534;
            color: #86efac;
        }

        .status.offline {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .metric {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 16px;
        }

        .metric label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
        }

        .metric value {
            font-size: 20px;
            font-weight: 700;
        }

        .metric.pnl value { color: #4ade80; }
        .metric.win value { color: #22d3ee; }
        .metric.trades value { color: #a78bfa; }
        .metric.active value { color: #fb923c; }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .trades {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .trade {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 12px;
        }

        .trade-type {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 2px;
            white-space: nowrap;
        }

        .trade-type.buy {
            background: rgba(34, 211, 238, 0.2);
            color: #67e8f9;
        }

        .trade-info {
            flex: 1;
        }

        .trade-market {
            font-weight: 600;
        }

        .trade-details {
            font-size: 10px;
            color: #94a3b8;
        }

        .trade-roi {
            font-weight: 700;
            color: #86efac;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(74, 222, 128, 0.2);
            border-top-color: #4ade80;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 16px;
            color: #64748b;
            font-size: 11px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Polymarket Bot</h1>
            <p class="subtitle">Systematic edge exploitation</p>
            <span id="status" class="status">Loading...</span>
        </header>

        <div id="content" style="display: none;">
            <div class="metrics">
                <div class="metric pnl">
                    <label>Total P&L</label>
                    <value id="total-profit">$0.00</value>
                </div>
                <div class="metric win">
                    <label>Win Rate</label>
                    <value id="win-rate">0%</value>
                </div>
                <div class="metric trades">
                    <label>Total Trades</label>
                    <value id="total-trades">0</value>
                </div>
                <div class="metric active">
                    <label>Active Now</label>
                    <value id="active-positions">0</value>
                </div>
            </div>

            <div class="section">
                <div class="section-title">✓ Recent Trades</div>
                <div id="trades" class="trades"></div>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Connecting to bot...</p>
        </div>

        <div class="footer">
            <p>🤖 Running on Railway</p>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const stats = await fetch('/stats').then(r => r.json());
                const trades = await fetch('/trades').then(r => r.json()).catch(() => []);

                document.getElementById('total-profit').textContent = `$${stats.total_profit?.toLocaleString('en-US', {maximumFractionDigits: 2}) || '0'}`;
                document.getElementById('win-rate').textContent = `${(stats.win_rate * 100)?.toFixed(1) || '0'}%`;
                document.getElementById('total-trades').textContent = stats.total_trades || '0';
                document.getElementById('active-positions').textContent = stats.active_positions || '0';

                const tradesDiv = document.getElementById('trades');
                if (trades && trades.length > 0) {
                    tradesDiv.innerHTML = trades.map(trade => `
                        <div class="trade">
                            <div class="trade-type ${trade.type}">${trade.type}</div>
                            <div class="trade-info">
                                <div class="trade-market">${trade.market}</div>
                                <div class="trade-details">$${trade.entry.toFixed(3)} → $${trade.exit.toFixed(3)}</div>
                            </div>
                            <div class="trade-roi">${trade.roi.toFixed(1)}%</div>
                        </div>
                    `).join('');
                } else {
                    tradesDiv.innerHTML = '<p style="color: #94a3b8;">No trades yet...</p>';
                }

                document.getElementById('status').textContent = '● Live';
                document.getElementById('content').style.display = 'block';
                document.getElementById('loading').style.display = 'none';

            } catch (err) {
                setTimeout(fetchData, 2000);
            }
        }

        setInterval(fetchData, 2000);
        fetchData();
    </script>
</body>
</html>
